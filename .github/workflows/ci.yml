name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: skills/cross-yield-router/package-lock.json
      - name: Install
        working-directory: skills/cross-yield-router
        run: npm ci
      - name: Check
        working-directory: skills/cross-yield-router
        run: npm run check
      - name: Smoke
        working-directory: skills/cross-yield-router
        run: npm run smoke:read
